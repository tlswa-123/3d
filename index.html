<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 飞船躲避游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }

        #gameCanvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            color: #00ffff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .instructions {
            color: #fff;
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #00ffff, #0080ff);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 255, 255, 0.5);
        }

        #finalScore {
            color: #ffff00;
            font-size: 32px;
            margin: 20px 0;
            font-weight: bold;
        }

        #health {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff4444;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="score">分数: 0</div>
        <div id="health">生命: ❤️❤️❤️</div>

        <div id="startScreen">
            <h1>🚀 飞船太空射击游戏</h1>
            <div class="instructions">
                <p>使用 <strong>WASD</strong> 或 <strong>方向键</strong> 控制飞船</p>
                <p>或者使用 <strong>鼠标</strong> 移动飞船</p>
                <p><strong>空格键</strong> 或 <strong>鼠标点击</strong> 射击</p>
                <p>🌍 普通星球：2-4次射击摧毁</p>
                <p>🪐 带星环星球：4-7次射击摧毁</p>
                <p>⚫ 黑洞：6-10次射击摧毁</p>
                <p>躲避或摧毁星球，存活越久分数越高！</p>
            </div>
            <button id="startBtn">开始游戏</button>
        </div>

        <div id="gameOverScreen">
            <h1>游戏结束!</h1>
            <div id="finalScore">最终分数: 0</div>
            <button id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game-toon-shading.js"></script>
</body>
</html>
